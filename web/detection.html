<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Model Dock - Detection</title>
    <meta name="description" content="Grounding DINO open-vocabulary detection demo" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=IBM+Plex+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="wrap">
      <nav class="topnav">
        <a href="./index.html">EfficientSAM Segmentation</a>
        <a class="active" href="./detection.html">Grounding DINO Detection</a>
      </nav>

      <header class="hero">
        <p class="eyebrow">FROM NOTEBOOK TASK</p>
        <h1>Open-vocabulary Detection</h1>
        <p class="desc">`grounding_dino_open_vocab_detection.ipynb`의 텍스트 프롬프트 검출 task를 웹으로 옮겼습니다.</p>
      </header>

      <section class="panel controls">
        <div class="row api-row">
          <label>
            API URL
            <input id="apiUrl" type="url" placeholder="https://your-api-server" />
          </label>
          <button id="saveApiBtn" class="small">저장</button>
          <button id="healthBtn" class="ghost small">헬스체크</button>
        </div>

        <div class="row">
          <label>
            Labels (comma separated)
            <input id="labelsInput" type="text" value="cat, remote control, sofa, lamp" />
          </label>
          <label>
            Box Threshold
            <input id="thresholdInput" type="number" value="0.35" min="0" max="1" step="0.01" />
          </label>
          <label>
            Text Threshold
            <input id="textThresholdInput" type="number" value="0.25" min="0" max="1" step="0.01" />
          </label>
        </div>

        <div class="row action-row">
          <input id="imageInput" type="file" accept="image/*" />
          <button id="runBtn">Run Detection</button>
        </div>

        <p id="status" class="status"></p>
      </section>

      <section class="panel stage">
        <div class="col">
          <h2>Input Image</h2>
          <img id="inputImg" alt="input image" />
        </div>
        <div class="col">
          <h2>Detection Overlay</h2>
          <img id="resultImg" alt="detection result" />
        </div>
      </section>

      <section class="panel">
        <h2>Detections</h2>
        <pre id="detList" class="det-list"></pre>
      </section>
    </main>

    <script src="./detect.js"></script>
  </body>
</html>
