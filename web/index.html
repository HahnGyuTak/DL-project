<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EfficientSAM Demo</title>
    <meta name="description" content="현재 프로젝트의 EfficientSAM 로직을 웹에서 실행하는 단일 데모 페이지" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=IBM+Plex+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="wrap">
      <header class="hero">
        <p class="eyebrow">CURRENT PROJECT LOGIC ONLY</p>
        <h1>EfficientSAM Segmentation Demo</h1>
        <p class="desc">
          이 페이지는 현재 디렉토리의 <code>app.py</code> 로직(이미지 업로드 + 포인트/박스 프롬프트 세그멘테이션)을
          단일 데모로 연결합니다.
        </p>
      </header>

      <section class="panel">
        <h2>Backend URL</h2>
        <p class="hint">배포된 Gradio 앱 URL을 입력하세요. (예: HF Space URL)</p>
        <div class="url-row">
          <input id="demoUrl" type="url" placeholder="https://your-gradio-app-url" />
          <button id="saveBtn">저장</button>
          <button id="resetBtn" class="ghost">기본값</button>
        </div>
        <p id="status" class="status"></p>
      </section>

      <section class="panel viewer-panel">
        <div class="viewer-head">
          <h2>Live Demo</h2>
          <a id="openNewTab" href="#" target="_blank" rel="noreferrer">새 탭으로 열기</a>
        </div>
        <div id="viewer" class="viewer"></div>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
