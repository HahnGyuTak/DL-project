<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Model Dock - Segmentation + SD3 Inpaint</title>
    <meta name="description" content="Segmentation + Stable Diffusion 3 inpainting demo" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=IBM+Plex+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="wrap">
      <nav class="topnav">
        <a href="./index.html">EfficientSAM Segmentation</a>
        <a href="./detection.html">Grounding DINO Detection</a>
        <a href="./vqa.html">LLaVA VQA</a>
        <a class="active" href="./seg_inpaint.html">Seg + SD3 Inpaint</a>
      </nav>

      <header class="hero">
        <h1>Segmentation + SD3 Inpaint</h1>
      </header>

      <section class="panel controls">
        <div class="row api-row">
          <label>
            API URL
            <input id="apiUrl" type="url" placeholder="https://your-api-server" />
          </label>
          <button id="saveApiBtn" class="small">저장</button>
          <button id="healthBtn" class="ghost small">헬스체크</button>
        </div>

        <div class="row">
          <label>
            Prompt Mode
            <select id="modeSelect">
              <option value="point">point</option>
              <option value="box">box</option>
            </select>
          </label>

          <label>
            Point Label
            <select id="labelSelect">
              <option value="1">foreground</option>
              <option value="0">background</option>
            </select>
          </label>

          <label>
            Input Size
            <input id="inputSize" type="number" value="1024" min="512" max="1536" step="64" />
          </label>
        </div>

        <div class="row action-row">
          <input id="imageInput" type="file" accept="image/*" />
          <button id="undoBtn" class="ghost">Undo</button>
          <button id="clearBtn" class="ghost">Clear</button>
          <button id="runSegBtn">Run Segmentation</button>
        </div>

        <p id="status" class="status"></p>
      </section>

      <section class="panel stage">
        <div class="col">
          <h2>Input + Prompts</h2>
          <canvas id="inputCanvas"></canvas>
        </div>
        <div class="col">
          <h2>Segmentation View</h2>
          <div class="view-switch">
            <button id="viewOverlayBtn" class="ghost active">Segmentation Overlay</button>
            <button id="viewMaskBtn" class="ghost">Auto Mask</button>
            <button id="viewCutoutBtn" class="ghost">Segmented Crop</button>
          </div>
          <img id="segViewImg" alt="segmentation view output" src="data:image/gif;base64,R0lGODlhAQABAAAAACwAAAAAAQABAAA=" />
        </div>
      </section>

      <section class="panel controls">
        <div class="row">
          <label>
            Edit Prompt
            <textarea id="editPrompt" class="inpaint-prompt" placeholder="예: turn the selected object into a red ceramic vase"></textarea>
          </label>
          <label>
            Negative Prompt
            <textarea id="negativePrompt" class="inpaint-prompt" placeholder="예: blurry, low quality, artifacts"></textarea>
          </label>
          <label>
            Max Side
            <input id="maxSideInput" type="number" value="1024" min="512" max="1536" step="64" />
          </label>
        </div>

        <div class="row">
          <label>
            Steps
            <input id="stepsInput" type="number" value="30" min="5" max="80" step="1" />
          </label>
          <label>
            Guidance
            <input id="guidanceInput" type="number" value="7.0" min="1" max="15" step="0.5" />
          </label>
          <label>
            Seed (-1 random)
            <input id="seedInput" type="number" value="-1" step="1" />
          </label>
          <label>
            Mask Expand(px)
            <input id="maskExpandInput" type="number" value="12" min="0" max="64" step="1" />
          </label>
        </div>

        <div class="row action-row">
          <div></div>
          <button id="runInpaintBtn">Run SD3 Inpaint</button>
        </div>
      </section>

      <section class="panel">
        <h2>Inpaint Result</h2>
        <img id="inpaintResultImg" alt="sd3 inpaint output" src="data:image/gif;base64,R0lGODlhAQABAAAAACwAAAAAAQABAAA=" />
      </section>
    </main>

    <script src="./seg_inpaint.js"></script>
  </body>
</html>
